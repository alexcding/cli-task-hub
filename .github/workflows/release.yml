name: Release

# Signed + notarized release build, published to GitHub Releases.
#
# Triggered when commits land on the `release` branch (i.e. you merge from
# main → release). Runs on the SELF-HOSTED macOS runner so the signing
# material never has to live in the public repo:
#
#   • Developer ID Application cert  → installed in the runner's login keychain.
#   • APPLE_TEAM_ID / APPLE_ID /
#     APPLE_APP_SPECIFIC_PASSWORD    → set in the runner's environment
#                                      (e.g. a `.env` file in the runner's
#                                      install dir, which the Actions runner
#                                      loads into every job automatically).
#
# Nothing Apple-related is referenced in this file or stored as a repo secret.
# Publishing uses the auto-provided GITHUB_TOKEN (no PAT needed).

on:
  push:
    branches: [release]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# Needed so electron-builder can create/upload the GitHub Release via GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      # package.json is the source of truth for the version — bump it
      # deliberately on main (npm version patch|minor|major) before merging here.
      # Fail fast if that version was already released, so we never re-publish
      # the same tag (a no-op for the auto-updater) and the mistake is obvious.
      - name: Guard against re-publishing an existing version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}")
          if [ "$STATUS" = "200" ]; then
            echo "::error::Release ${TAG} already exists. Bump the version in package.json before merging to release."
            exit 1
          fi
          echo "OK to publish ${TAG}"

      # node scripts/build.js --publish:
      #   • sets TASKHUB_RELEASE=1 → signed + notarized + hardened-runtime build
      #   • reads Apple API-key creds from the runner env (cert from the keychain)
      #   • publishes the release tagged v<version> to GitHub Releases
      - name: Build, sign, notarize & publish
        run: npm run release
        env:
          # electron-builder publishes with this; build.js prefers it over `gh`.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
