name: Build

# CI build for the public repo. Runs the ad-hoc (unsigned) build path only —
# it verifies the app compiles, tests pass, and packages cleanly without
# touching any Apple Developer credentials or publishing to GitHub Releases.
#
# The signed/notarized release build (npm run release) is intentionally NOT
# run here: it needs APPLE_TEAM_ID / APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD,
# a Developer ID cert, and a publish token — private things that must never
# live in a public workflow. Cut releases locally with `npm run release`.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A public-fork PR can't read repo secrets anyway; pin permissions to read-only
# so this workflow can never publish or mutate the repo.
permissions:
  contents: read

jobs:
  build:
    # macOS runner required: the build uses sips/iconutil/codesign.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      # Ad-hoc build only. electron-builder.config.js takes the unsigned path
      # because TASKHUB_RELEASE is unset; scripts/afterPack.js ad-hoc signs it.
      # No CSC_*, APPLE_*, or GH_TOKEN env is referenced anywhere here.
      - name: Build (ad-hoc, unsigned)
        run: npm run build

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskHub-arm64
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 7
